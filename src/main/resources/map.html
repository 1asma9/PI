<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Carte OpenStreetMap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; }
        .leaflet-tile-pane { opacity: 1 !important; }
        .leaflet-tile { border: none !important; }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

    // ==============================
    // INITIALISATION CARTE
    // ==============================
    let map = L.map('map', {
        zoomControl: true,
        fadeAnimation: false,
        markerZoomAnimation: false
    }).setView([36.8065, 10.1815], 6);

    // CartoDB Voyager : bien plus stable dans JavaFX WebView que OSM standard
    const cartoLayer = L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        });

    // OSM standard en fallback
    const osmLayer = L.tileLayer(
        'https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        });

    // Si CartoDB échoue → basculer sur OSM
    let cartoFailed = false;
    cartoLayer.on('tileerror', function() {
        if (!cartoFailed) {
            cartoFailed = true;
            map.removeLayer(cartoLayer);
            osmLayer.addTo(map);
        }
    });

    cartoLayer.addTo(map);

    // Forcer le redraw des tuiles après déplacement (corrige les zones grises)
    map.on('moveend zoomend', function () {
        map.eachLayer(function (layer) {
            if (layer instanceof L.TileLayer) {
                layer.redraw();
            }
        });
    });

    let markerStart, markerEnd, polyline;

    let userLat = 36.8065;
    let userLng = 10.1815;

    markerStart = L.marker([userLat, userLng])
        .addTo(map)
        .bindPopup("Départ")
        .openPopup();

    // ==============================
    // FONCTION PRINCIPALE
    // ==============================
    window.setDestination = function(endLat, endLng, transportType) {
        if(markerEnd) map.removeLayer(markerEnd);
        if(polyline) map.removeLayer(polyline);

        markerEnd = L.marker([endLat, endLng])
            .addTo(map)
            .bindPopup("Arrivée");

        let bounds = L.latLngBounds([[userLat, userLng],[endLat, endLng]]);
        map.fitBounds(bounds, {padding:[50,50]});

        console.log("Transport reçu:", transportType);

        // ==============================
        // ✈️ AVION (ligne droite rouge)
        // ==============================
        if (transportType.toLowerCase() === "avion") {
            polyline = L.polyline([[userLat, userLng],[endLat, endLng]], {
                color: 'red',
                dashArray: '6,6',
                weight: 4
            }).addTo(map);

            const distance = map.distance(
                L.latLng(userLat, userLng),
                L.latLng(endLat, endLng)
            ) / 1000;

            const durationMin = ((distance / 900) * 60).toFixed(0);

            if(window.javaConnector) {
                window.javaConnector.sendRouteInfo(distance.toFixed(2), durationMin, "Avion");
            }
            return;
        }

        // ==============================
        // 🚆 TRAIN (ligne droite verte)
        // ==============================
        if (transportType.toLowerCase() === "train") {
            polyline = L.polyline([[userLat, userLng],[endLat, endLng]], {
                color: 'green',
                dashArray: '3,8',
                weight: 4
            }).addTo(map);

            const distance = map.distance(
                L.latLng(userLat, userLng),
                L.latLng(endLat, endLng)
            ) / 1000;

            const durationMin = ((distance / 150) * 60).toFixed(0);

            if(window.javaConnector) {
                window.javaConnector.sendRouteInfo(distance.toFixed(2), durationMin, "Train");
            }
            return;
        }

        // ==============================
        // 🚗 🚲 🚶 OSRM (gratuit, sans clé)
        // ==============================
        let osrmProfile;
        if (transportType.toLowerCase() === "voiture") {
            osrmProfile = "driving";
        } else if (transportType.toLowerCase() === "vélo") {
            osrmProfile = "cycling";
        } else if (transportType.toLowerCase() === "piéton") {
            osrmProfile = "foot";
        } else {
            osrmProfile = "driving";
        }

        const osrmUrl = `https://router.project-osrm.org/route/v1/${osrmProfile}/`
            + `${userLng},${userLat};${endLng},${endLat}`
            + `?overview=full&geometries=geojson`;

        fetch(osrmUrl)
            .then(response => response.json())
            .then(data => {
                if (!data.routes || data.routes.length === 0) {
                    alert("Aucune route trouvée !");
                    return;
                }

                const route = data.routes[0];
                const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);

                polyline = L.polyline(coords, {
                    color: 'blue',
                    weight: 5
                }).addTo(map);

                map.fitBounds(polyline.getBounds(), {padding:[50,50]});

                const distance = (route.distance / 1000).toFixed(2);
                const duration = (route.duration / 60).toFixed(0);

                if(window.javaConnector) {
                    window.javaConnector.sendRouteInfo(distance, duration, transportType);
                }
            })
            .catch(err => {
                console.error("Erreur OSRM:", err);
                alert("Erreur lors du calcul de la route");
            });
    }

</script>
</body>
</html>
